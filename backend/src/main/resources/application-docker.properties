spring.application.name=arenahub
server.port=8080

# Database Configuration (Docker)
spring.datasource.url=jdbc:mysql://db:3306/arenahub?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Fortaleza&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:arenahub_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:arenahub_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration
app.jwt.secret=${JWT_SECRET:arenaHubJwtSecretKey2026MuitoSeguraComMaisDe32Caracteres}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# CORS Configuration
app.cors.allowed-origin-patterns=${CORS_ORIGIN:http://localhost:*,http://frontend,http://frontend:*}

# Server Configuration
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# Logging
logging.level.root=INFO
logging.level.com.arenahub=DEBUG

# Actuator (Health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
